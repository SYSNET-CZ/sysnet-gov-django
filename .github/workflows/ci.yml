# GitHub Actions CI pro sysnet-auth
#
# Zrcadlo .gitlab-ci.yml. Na GitHubu pokryva otevreny zrcadlovy mirror;
# produkcni publish bezi na GitLabu (interni PyPi).

name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install 'ruff>=0.6'
      - run: ruff check auth_lib tests scripts
      - run: ruff format --check auth_lib tests scripts

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: mypy --strict auth_lib

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest -vv --cov=auth_lib --cov-report=term-missing --cov-report=xml
      - name: Coverage gate (>= 95%)
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, sys
          pct = float(ET.parse("coverage.xml").getroot().attrib["line-rate"]) * 100
          print(f"Coverage: {pct:.2f}%")
          sys.exit(0 if pct >= 95.0 else 1)
          PY
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
      - name: Version consistency check
        run: |
          python - <<'PY'
          import tomllib, os, sys
          v = tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"]
          print(f"pyproject version: {v}")
          ref = os.environ.get("GITHUB_REF", "")
          if ref.startswith("refs/tags/v"):
              tag_v = ref.removeprefix("refs/tags/v")
              if tag_v \!= v:
                  print(f"ERROR: tag version {tag_v} \!= pyproject {v}")
                  sys.exit(1)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # Publish na verejny PyPi -- pokud by sysnet-auth byl open-source.
  # Pro interni PyPi pouzivat GitLab CI (publish_internal job).
  publish_public:
    name: Publish to PyPi
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release  # vyzaduje manual approval
    permissions:
      id-token: write  # pro trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Pro interni balicek je to obvykle zakazane -- viz GitLab CI.
          # Zde pro uplnost v pripade, ze by se cast knihovny open-sourcovala.
          skip-existing: true
